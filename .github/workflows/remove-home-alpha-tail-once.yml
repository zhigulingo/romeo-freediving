name: Remove home alpha tail once

on: push

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove dangling alpha initializer
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          lines = [
              '',
              '        if (document.readyState === "loading") {',
              '            document.addEventListener("DOMContentLoaded", initHeroAlphaLayer);',
              '        } else {',
              '            initHeroAlphaLayer();',
              '        }',
              ''
          ]
          text = text.replace('\n'.join(lines), '\n')
          path.write_text(text)
          Path('.github/workflows/remove-home-alpha-tail-once.yml').unlink()
          PY
      - name: Commit and push cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add index.html .github/workflows/remove-home-alpha-tail-once.yml
          git commit -m "fix: remove home alpha initializer"
          git push
