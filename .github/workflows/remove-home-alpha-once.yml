name: Remove home alpha video once

on: push

permissions:
  contents: write

jobs:
  remove-alpha:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove alpha video layer from homepage
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text()
          text = re.sub(r'        \.hero-alpha-layer \{.*?\n\n', '', text, flags=re.S)
          text = re.sub(r'            <div class="hero-alpha-layer" data-alpha-layer aria-hidden="true">.*?            </div>\n', '', text, flags=re.S)
          text = re.sub(r'        function initHeroAlphaLayer\(\) \{.*?        \}\n', '', text, flags=re.S)
          path.write_text(text)
          Path('.github/workflows/remove-home-alpha-once.yml').unlink()
          PY
      - name: Commit and push removal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add index.html .github/workflows/remove-home-alpha-once.yml
          git commit -m "fix: remove home alpha video"
          git push
